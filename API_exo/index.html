<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Démo EyeDropper API</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            transition: background-color 0.3s ease;
            color: white; 
        }

        #colorDisplay {
            margin-top: 20px;
            font-size: 32px;
            font-weight: bold;
            mix-blend-mode: difference;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="startBtn">Choisir une couleur</button>
    <div id="colorDisplay">#222222</div>

    <script src="app.js"></script>
</body>
</html>
