<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Démo EyeDropper API</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            transition: background-color 0.3s ease;
            /* La couleur de base du texte doit être blanche pour le calcul d'opposition */
            color: white; 
        }

        #colorDisplay {
            margin-top: 20px;
            font-size: 32px;
            font-weight: bold;
            /* CETTE LIGNE FAIT TOUT LE TRAVAIL : */
            mix-blend-mode: difference;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="startBtn">Choisir une couleur</button>
    <div id="colorDisplay">#FFFFFF</div>

    <script>
        const btn = document.getElementById('startBtn');
        const display = document.getElementById('colorDisplay');

        btn.addEventListener('click', async () => {
            if (!window.EyeDropper) {
                alert("Navigateur non supporté");
                return;
            }

            const dropper = new EyeDropper();

            try {
                const result = await dropper.open();
                document.body.style.backgroundColor = result.sRGBHex;
                display.textContent = result.sRGBHex;
            } catch (error) {
                console.log("Annulé");
            }
        });
    </script>
</body>
</html>
